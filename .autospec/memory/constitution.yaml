constitution:
  project_name: "Claude Clean"
  version: "1.0.0"
  ratified: "2025-12-20"
  last_amended: "2025-12-20"

preamble: |
  Claude Clean (cclean) is a terminal parser that transforms Claude Code's raw stream-json
  output into beautiful, human-readable terminal output. These principles ensure the tool
  remains reliable, maintainable, and provides a consistent user experience across all
  output styles and input sources.

principles:
  - name: "Format Before Commit"
    id: "PRIN-001"
    category: "quality"
    priority: "NON-NEGOTIABLE"
    description: |
      All Go code must be formatted with gofmt before committing.
      Unformatted code will cause CI pipeline failures.
    rationale: "Ensures consistent code style across the codebase and prevents CI failures"
    enforcement:
      - mechanism: "CI pipeline"
        description: "GitHub Actions format check fails if code is not formatted"
      - mechanism: "Makefile target"
        description: "make fmt formats all Go code; make all runs fmt before build"
    exceptions: []

  - name: "Static Analysis Required"
    id: "PRIN-002"
    category: "quality"
    priority: "MUST"
    description: |
      All code must pass go vet static analysis without warnings.
      Static analysis catches common errors before they reach production.
    rationale: "Catches bugs and issues early in development cycle"
    enforcement:
      - mechanism: "CI pipeline"
        description: "GitHub Actions runs go vet on all pushes and PRs"
      - mechanism: "Makefile target"
        description: "make vet runs static analysis; make all includes vet"
    exceptions:
      - "Third-party generated code"

  - name: "Tests Must Pass"
    id: "PRIN-003"
    category: "quality"
    priority: "NON-NEGOTIABLE"
    description: |
      All tests must pass before merging to main branch.
      Tests are run with race detection enabled in CI.
    rationale: "Ensures code correctness and prevents regressions"
    enforcement:
      - mechanism: "CI pipeline"
        description: "GitHub Actions runs go test -v -race on all pushes"
      - mechanism: "Release workflow"
        description: "Release workflow runs tests before building binaries"
    exceptions: []

  - name: "Standard Go Project Layout"
    id: "PRIN-004"
    category: "architecture"
    priority: "MUST"
    description: |
      Follow standard Go project layout conventions:
      - cmd/ for application entry points
      - Public packages (parser/, display/) at top level for library use
      - Internal packages for non-exported code
      - mocks/ for test data
    rationale: "Enables use as both CLI tool and importable library"
    enforcement:
      - mechanism: "Code review"
        description: "Reviewers verify new code follows established structure"
    exceptions:
      - "Scripts and configuration files in project root"

  - name: "Semantic Versioning"
    id: "PRIN-005"
    category: "process"
    priority: "MUST"
    description: |
      All releases must follow semantic versioning (vMAJOR.MINOR.PATCH).
      Version bumps are managed through Makefile targets (make patch/minor/major).
    rationale: "Provides predictable versioning for users and integrations"
    enforcement:
      - mechanism: "Release workflow"
        description: "Tags trigger automated releases via GitHub Actions"
      - mechanism: "Makefile targets"
        description: "patch/minor/major targets enforce proper version increments"
    exceptions: []

  - name: "Multi-Platform Support"
    id: "PRIN-006"
    category: "architecture"
    priority: "MUST"
    description: |
      Releases must include binaries for all supported platforms:
      - Linux (amd64, arm64)
      - macOS (amd64, arm64)
      - Windows (amd64)
    rationale: "Ensures broad user accessibility"
    enforcement:
      - mechanism: "Release workflow"
        description: "GitHub Actions builds and uploads all platform binaries"
      - mechanism: "Checksum verification"
        description: "SHA256SUMS file generated for all release artifacts"
    exceptions: []

  - name: "Stream Processing Performance"
    id: "PRIN-007"
    category: "quality"
    priority: "SHOULD"
    description: |
      The tool must efficiently process streaming input in real-time.
      Large outputs (>10MB buffer) should be handled gracefully with truncation.
    rationale: "Maintains responsive user experience with live streaming data"
    enforcement:
      - mechanism: "Code constants"
        description: "MaxBufferCapacity constant (10MB) enforces limits"
      - mechanism: "Code review"
        description: "Reviewers verify streaming performance considerations"
    exceptions:
      - "File-based processing may have different characteristics"

  - name: "Output Style Consistency"
    id: "PRIN-008"
    category: "architecture"
    priority: "MUST"
    description: |
      Each output style (default, compact, minimal, plain) must provide
      consistent formatting for all message types (system, assistant, tool, result).
    rationale: "Ensures predictable output regardless of chosen style"
    enforcement:
      - mechanism: "Code structure"
        description: "Each style has its own file with complete message type coverage"
      - mechanism: "Testing"
        description: "Display tests verify style consistency"
    exceptions: []

sections:
  - name: "Code Quality"
    content: |
      All Go code must be formatted with gofmt.
      All code must pass go vet without warnings.
      Tests must pass before merging.
      Race conditions must be checked (go test -race).
      Dependencies must be verified (go mod verify).

  - name: "Development Workflow"
    content: |
      Use 'make all' before committing to run fmt, vet, and build.
      Use 'make test' to run the test suite.
      Use 'make run' to test with sample data from mocks/.
      Single-letter Makefile shortcuts available (b/t/f/v/a).

  - name: "Release Process"
    content: |
      Releases are triggered by pushing version tags (v*).
      Use 'make patch/minor/major' for version bumps.
      All releases include multi-platform binaries and checksums.
      Release notes are auto-generated from commits.

  - name: "Documentation"
    content: |
      CLAUDE.md provides development guidance for AI assistants.
      README.md provides user-facing documentation.
      Additional docs in docs/ directory (USAGE, INSTALL, DEVELOPMENT, etc.).
      Inline code comments where logic is not self-evident.

governance:
  amendment_process:
    - step: 1
      action: "Propose change via pull request"
      requirements: "Include rationale and impact assessment"
    - step: 2
      action: "Review period"
      requirements: "Allow time for maintainer review"
    - step: 3
      action: "Approval"
      requirements: "Requires maintainer approval"
    - step: 4
      action: "Merge and version bump"
      requirements: "Update version and last_amended date"

  versioning_policy: |
    Constitution versions follow semantic versioning.
    MAJOR: Changes that invalidate existing compliant code.
    MINOR: New principles or expanded guidance.
    PATCH: Clarifications without behavioral change.

  compliance_review:
    frequency: "as-needed"
    process: "Review principles when adding major features or changing architecture"

  rules:
    - "Changes require review by maintainer"
    - "Breaking changes require explicit discussion"
    - "CI pipeline changes must maintain existing quality gates"

sync_impact:
  version_change: "0.0.0 -> 1.0.0"
  modified_principles: []
  added_sections:
